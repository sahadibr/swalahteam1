<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Ultimate Team Program Hub - Swalah Team 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #1e293b; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 950px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #0f172a; font-size: 2.3rem; }
        .admin-bar { background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; gap: 15px; border-left: 6px solid #64748b; }
        .admin-bar.unlocked { border-left-color: #10b981; background: #f0fdf4; }
        .login-inputs { display: flex; gap: 10px; }
        .login-inputs input { padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; }
        .admin-btn { padding: 10px 20px; background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .admin-btn.logout { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .wing-tabs { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .wing-btn { padding: 14px 28px; font-weight: 700; background: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.3s; }
        .wing-btn.btn-English.active { background: #3b82f6; color: white; }
        .wing-btn.btn-Urdu.active { background: #ec4899; color: white; }
        .wing-btn.btn-Kannada.active { background: #eab308; color: #1e293b; }
        .wing-btn.btn-Arabic.active { background: #10b981; color: white; }
        .main-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 8px solid #3b82f6; }
        .group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        label { font-weight: 700; color: #334155; }
        input[type="text"], textarea { padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; width: 100%; outline: none; background: #f8fafc; }
        textarea { height: 100px; resize: none; }
        input:disabled, textarea:disabled, .member-card.disabled { background: #f1f5f9 !important; cursor: not-allowed !important; opacity: 0.7; }
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .member-card { display: flex; align-items: center; gap: 12px; padding: 15px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .profile-panel { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 8px solid #6366f1; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .stat-badge { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; padding: 8px 18px; border-radius: 20px; font-weight: 700; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { background: #f1f5f9; color: #475569; font-weight: 700; padding: 12px; text-align: left; }
        td { padding: 14px; background: white; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        td:first-child { border-radius: 10px 0 0 10px; }
        td:last-child { border-radius: 0 10px 10px 0; }
        .wing-tag { padding: 4px 10px; border-radius: 6px; font-weight: 700; color: white; font-size: 0.85rem; }
        .tag-English { background: #3b82f6; }
        .tag-Urdu { background: #ec4899; }
        .tag-Kannada { background: #eab308; color: #1e293b; }
        .tag-Arabic { background: #10b981; }
        .save-bar { display: flex; justify-content: flex-end; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Swalah Team 1 Dashboard</h1>

    <div class="admin-bar" id="adminBar">
        <div><span class="status-text" id="statusText" style="color: #64748b;">🔒 View Only Mode</span></div>
        <div class="login-inputs" id="loginForm">
            <input type="text" id="usernameInput" placeholder="Username">
            <input type="password" id="passwordInput" placeholder="Password">
            <button class="admin-btn" onclick="tryLogin()">Unlock</button>
        </div>
        <button class="admin-btn logout" id="logoutBtn" style="display: none;" onclick="logout()">Lock Admin</button>
    </div>

    <div class="wing-tabs">
        <button class="wing-btn btn-English active" onclick="changeWing('English')">English Wing</button>
        <button class="wing-btn btn-Urdu" onclick="changeWing('Urdu')">Urdu Wing</button>
        <button class="wing-btn btn-Kannada" onclick="changeWing('Kannada')">Kannada Wing</button>
        <button class="wing-btn btn-Arabic" onclick="changeWing('Arabic')">Arabic Wing</button>
    </div>

    <div class="main-box" id="workspaceBox">
        <h3 id="wingTitle" style="margin-bottom: 15px; color:#3b82f6; font-size: 1.3rem;">English Wing Details</h3>
        
        <div class="group">
            <label>Program Name</label>
            <input type="text" id="pName" placeholder="Type program name here..." disabled>
        </div>

        <div class="group">
            <label>Description</label>
            <textarea id="pDesc" placeholder="Write description/notes about who attempted and what they did here..." disabled></textarea>
        </div>

        <label>Who Attempted / Attended?</label>
        <div class="members-grid" id="checkboxArea"></div>

        <div class="save-bar">
            <button class="admin-btn" id="saveServerBtn" onclick="uploadToServer()" style="background:#10b981; display:none;">Save to Cloud</button>
        </div>
    </div>

    <div class="profile-panel">
        <div class="profile-header">
            <h2 id="selectedMemberName" style="color:#0f172a; font-size: 1.4rem;">Click a member above to see their details</h2>
            <div id="totalBadge" class="stat-badge" style="display: none;">Total Attended: <span id="statTotal">0</span></div>
        </div>
        <div id="reportContent" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">Wing</th>
                        <th style="width: 30%;">Program Name</th>
                        <th style="width: 45%;">Description / Notes</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Paste your NEW Google Web App URL here (Line 178)
    const SCRIPT_URL = "YOUR_NEW_WEB_APP_URL_HERE";

    let isAdmin = false;
    const team = [
        { id: 'm1', name: 'Sahad' }, { id: 'm2', name: 'Shahim' }, { id: 'm3', name: 'Thajuddeen' },
        { id: 'm4', name: 'Razi' }, { id: 'm5', name: 'Apsal' }, { id: 'm6', name: 'Azar' },
        { id: 'm7', name: 'Ansaf' }, { id: 'm8', name: 'Raza Hamza' }
    ];

    const wingThemes = { English: '#3b82f6', Urdu: '#ec4899', Kannada: '#eab308', Arabic: '#10b981' };
    let dataStore = {
        English: { name: '', description: '', attendees: [] },
        Urdu: { name: '', description: '', attendees: [] },
        Kannada: { name: '', description: '', attendees: [] },
        Arabic: { name: '', description: '', attendees: [] }
    };

    let currentWing = 'English';
    let viewedMemberId = null;

    async function loadFromServer() {
        if(!SCRIPT_URL || SCRIPT_URL.includes("URL_HERE")) return;
        try {
            let res = await fetch(SCRIPT_URL);
            let json = await res.json();
            if(json) {
                dataStore = json;
                changeWing(currentWing);
            }
        } catch(e) { console.log("Load error", e); }
    }

    async function uploadToServer() {
        if(!isAdmin) return;
        
        dataStore[currentWing].name = document.getElementById('pName').value;
        dataStore[currentWing].description = document.getElementById('pDesc').value;
        
        let list = [];
        team.forEach(m => {
            const cb = document.getElementById(`check-${m.id}`);
            if (cb && cb.checked) list.push(m.id);
        });
        dataStore[currentWing].attendees = list;

        const btn = document.getElementById('saveServerBtn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    wing: currentWing,
                    name: dataStore[currentWing].name,
                    description: dataStore[currentWing].description,
                    attendees: dataStore[currentWing].attendees
                })
            });
            alert("Saved permanently to Google Sheet cloud!");
        } catch(e) { alert("Error saving data"); }
        
        btn.innerText = "Save to Cloud";
        btn.disabled = false;
        if (viewedMemberId) viewMemberReport(viewedMemberId);
    {https://script.google.com/macros/s/AKfycbxhe8zVL_m18KyBcHX_TPWr6bGs735Z2rsaqoXlweYmUOkYNam-CZDFWgooYN8EIK-l/exec}

    function tryLogin() {
        const u = document.getElementById('usernameInput').value;
        const p = document.getElementById('passwordInput').value;
        if (u === 'sahadibrahim' && p === '734962') {
            isAdmin = true;
            document.getElementById('statusText').innerText = "🔓 Admin Mode";
            document.getElementById('statusText').style.color = "#10b981";
            document.getElementById('adminBar').classList.add('unlocked');
            document.getElementById('loginForm').style.display = "none";
            document.getElementById('logoutBtn').style.display = "block";
            document.getElementById('saveServerBtn').style.display = "block";
            document.getElementById('pName').disabled = false;
            document.getElementById('pDesc').disabled = false;
            renderCheckboxes();
        } else { alert("Wrong ID/Password"); }
    }

    function logout() {
        isAdmin = false;
        document.getElementById('statusText').innerText = "🔒 View Only Mode";
        document.getElementById('statusText').style.color = "#64748b";
        document.getElementById('adminBar').classList.remove('unlocked');
        document.getElementById('loginForm').style.display = "flex";
        document.getElementById('logoutBtn').style.display = "none";
        document.getElementById('saveServerBtn').style.display = "none";
        document.getElementById('pName').disabled = true;
        document.getElementById('pDesc').disabled = true;
        renderCheckboxes();
    }

    function renderCheckboxes() {
        const area = document.getElementById('checkboxArea');
        area.innerHTML = '';
        team.forEach(m => {
            const isChecked = dataStore[currentWing].attendees.includes(m.id);
            const disabledClass = isAdmin ? '' : 'disabled';
            const disabledAttr = isAdmin ? '' : 'disabled';
            area.innerHTML += `
                <div class="member-card ${disabledClass}" onclick="viewMemberReport('${m.id}')">
                    <input type="checkbox" id="check-${m.id}" ${isChecked ? 'checked' : ''} ${disabledAttr} 
                           style="accent-color: ${wingThemes[currentWing]}" onclick="event.stopPropagation();">
                    <strong style="flex-grow:1; color: #334155; margin-left:10px;">${m.name}</strong>
                </div>
            `;
        });
    }

    function changeWing(wing) {
        currentWing = wing;
        document.querySelectorAll('.wing-btn').forEach(b => {
            b.classList.remove('active');
            if(b.innerText.includes(wing)) b.classList.add('active');
        });
        const themeColor = wingThemes[wing];
        document.getElementById('wingTitle').innerText = `${wing} Wing Details`;
        document.getElementById('wingTitle').style.color = themeColor;
        document.getElementById('workspaceBox').style.borderColor = themeColor;
        document.getElementById('pName').value = dataStore[wing].name || '';
        document.getElementById('pDesc').value = dataStore[wing].description || '';
        renderCheckboxes();
    }

    function viewMemberReport(memberId) {
        viewedMemberId = memberId;
        const target = team.find(m => m.id === memberId);
        document.getElementById('selectedMemberName').innerText = "👤 " + target.name + "'s Attendance History";
        document.getElementById('reportContent').style.display = 'block';
        document.getElementById('totalBadge').style.display = 'block';
        let total = 0;
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = '';

        Object.keys(dataStore).forEach(wingName => {
            const wing = dataStore[wingName];
            if (wing.attendees && wing.attendees.includes(memberId) && wing.name.trim() !== "") {
                total++;
                tbody.innerHTML += `
                    <tr>
                        <td><span class="wing-tag tag-${wingName}">${wingName} Wing</span></td>
                        <td style="font-weight: 600; color: #475569;">${wing.name}</td>
                        <td style="color: #64748b; font-size:0.9rem;">${wing.description || 'No description added.'}</td>
                    </tr>
                `;
            }
        });
        document.getElementById('statTotal').innerText = total;
        if(total === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#94a3b8; padding: 25px;">No active records found.</td></tr>`;
        }
    }

    // Initial Database load
    loadFromServer();
</script>
</body>
</html>
